# Yiora Server CI/CD
# verify:      gofmt / go vet / go build / 单测(+race,Linux 有 CGO)
# integration: testcontainers 拉真 MySQL 8 验忧珠账务并发安全
# image:       main 分支与 v* 标签构建并推送 GHCR 镜像(一镜像含 api+ws 双二进制)
name: server-ci

# push 不做 paths 过滤:保证 v* 标签发版一定触发镜像构建(paths 过滤对 tag push 判定不可靠)
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths: ['server/**', '.github/workflows/ci.yml']

defaults:
  run:
    working-directory: server

jobs:
  verify:
    name: build & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt violations:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: |
          go vet ./...
          go vet -tags integration ./internal/model/

      - name: go build
        run: go build ./...

      - name: unit tests (with race)
        run: go test -race -count=1 ./internal/...

      - name: govulncheck (known-vuln scan, advisory)
        # 漏洞库更新可能引入与本次改动无关的失败,先做告警不阻塞;治理策略收敛后改为阻塞
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  integration:
    name: youzhu ledger integration (real MySQL)
    runs-on: ubuntu-latest # runner 自带 Docker,testcontainers 直接可用
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: integration tests (testcontainers + mysql:8.0)
        run: go test -tags integration -count=1 -timeout 20m -v -run TestIntegration ./internal/model/

  image:
    name: build & push image (GHCR)
    runs-on: ubuntu-latest
    needs: [verify, integration]
    # 仅主干推进与版本标签发布镜像;PR 只做构建验证
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yiora-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # CI 网络直连官方代理;国内本地构建仍用 Dockerfile 默认 goproxy.cn
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
          cache-from: type=gha
          cache-to: type=gha,mode=max
