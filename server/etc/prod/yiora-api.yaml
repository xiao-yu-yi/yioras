# 生产配置:全部敏感值经环境变量注入(conf.UseEnv),本文件不含任何真实密钥
Name: yiora-api
Host: 0.0.0.0
Port: 8888
Timeout: 8000 # ms

Auth:
  AccessSecret: ${YIORA_JWT_SECRET} # 与 ws 网关一致,>=32 位随机串
  AccessExpire: 604800 # 7天(秒)

MySQL:
  DataSource: ${YIORA_MYSQL_USER}:${YIORA_MYSQL_PASSWORD}@tcp(mysql:3306)/yiora?charset=utf8mb4&parseTime=true&loc=Local

Redis:
  Host: redis:6379
  Type: node
  Pass: ${YIORA_REDIS_PASSWORD}

WsPush:
  URL: http://ws:8889/internal/push
  Token: ${YIORA_INTERNAL_TOKEN}

Email:
  Host: ${YIORA_SMTP_HOST}
  Port: 465
  Username: ${YIORA_SMTP_USER}
  Password: ${YIORA_SMTP_PASSWORD}
  From: ${YIORA_SMTP_FROM}
  Mock: false

Admin:
  IPAllowlist: ${YIORA_ADMIN_IP_ALLOWLIST} # 逗号分隔 IP/CIDR;留空=不限制(经反代时确保传真实客户端 IP)
  LoginFailLimit: 5
  LoginLockSec: 900
