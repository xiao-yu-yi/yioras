# 生产配置:全部敏感值经环境变量注入(conf.UseEnv),本文件不含任何真实密钥
Name: yiora-api
Host: 0.0.0.0
Port: 8888
Timeout: 8000 # ms

Auth:
  AccessSecret: ${YIORA_JWT_SECRET} # 与 ws 网关一致,>=32 位随机串
  AccessExpire: 604800 # 7天(秒)

MySQL:
  DataSource: ${YIORA_MYSQL_USER}:${YIORA_MYSQL_PASSWORD}@tcp(mysql:3306)/yiora?charset=utf8mb4&parseTime=true&loc=Local

Redis:
  Host: redis:6379
  Type: node
  Pass: ${YIORA_REDIS_PASSWORD}

WsPush:
  URL: http://ws:8889/internal/push
  Token: ${YIORA_INTERNAL_TOKEN}

Email:
  Host: ${YIORA_SMTP_HOST}
  Port: 465
  Username: ${YIORA_SMTP_USER}
  Password: ${YIORA_SMTP_PASSWORD}
  From: ${YIORA_SMTP_FROM}
  Mock: false

Admin:
  IPAllowlist: ${YIORA_ADMIN_IP_ALLOWLIST} # 逗号分隔 IP/CIDR;留空=不限制(经反代时确保传真实客户端 IP)
  LoginFailLimit: 5
  LoginLockSec: 900

Storage:
  Endpoint: ${YIORA_S3_ENDPOINT} # S3 兼容端点(OSS/MinIO)
  PublicBaseURL: ${YIORA_S3_PUBLIC_URL} # CDN/公开访问基址
  Region: ${YIORA_S3_REGION}
  Bucket: ${YIORA_S3_BUCKET}
  AccessKey: ${YIORA_S3_ACCESS_KEY}
  SecretKey: ${YIORA_S3_SECRET_KEY}

ImgScan:
  Provider: ${YIORA_IMGSCAN_PROVIDER} # 图片机审驱动:留空=关闭;tencent/aliyun 二期接入

Search:
  Provider: ${YIORA_SEARCH_PROVIDER} # mysql(默认 LIKE)或 meili
  Host: ${YIORA_MEILI_HOST}
  APIKey: ${YIORA_MEILI_KEY}
  SyncIntervalSec: 60

LLM:
  BaseURL: ${YIORA_LLM_BASE_URL} # 空=管家纯 FAQ 规则模式
  APIKey: ${YIORA_LLM_API_KEY}
  Model: ${YIORA_LLM_MODEL}
  TimeoutSec: 5

Push:
  APNs: # 四项配齐启用 iOS 离线推送;厂商通道随账号开通补
    KeyID: ${YIORA_APNS_KEY_ID}
    TeamID: ${YIORA_APNS_TEAM_ID}
    BundleID: ${YIORA_APNS_BUNDLE_ID}
    PrivateKey: ${YIORA_APNS_P8}
    Production: true
