Name: yiora-api
Host: 0.0.0.0
Port: 8888
Timeout: 8000 # ms

Auth:
  AccessSecret: change-me-to-a-long-random-secret # 生产从环境变量/密管注入,禁止提交真实值
  AccessExpire: 604800 # 7天(秒)

MySQL:
  DataSource: root:root@tcp(127.0.0.1:3306)/yiora?charset=utf8mb4&parseTime=true&loc=Local

Redis:
  Host: 127.0.0.1:6379
  Type: node

WsPush:
  URL: http://127.0.0.1:8889/internal/push
  Token: change-me-internal-push-token # 与 yiora-ws.yaml InternalToken 一致

Email:
  Host: smtp.example.com
  Port: 465
  Username: noreply@example.com
  Password: change-me
  From: noreply@example.com
  Mock: true # 本地开发验证码打日志不真发,联调邮件服务后改 false

Admin:
  IPAllowlist: "" # 后台 IP 白名单,逗号分隔 IP/CIDR(如 "10.0.0.0/8,203.0.113.7");空=不限制
  LoginFailLimit: 5 # 同账号连续错密上限
  LoginLockSec: 900 # 锁定时长(秒)

Storage:
  Endpoint: http://127.0.0.1:9000 # S3 兼容端点(MinIO/OSS);留空则上传接口返回未配置
  PublicBaseURL: http://127.0.0.1:9000 # 客户端直传/回源基址
  Region: us-east-1
  Bucket: yiora
  AccessKey: yiora-minio
  SecretKey: yiora-minio-secret

ImgScan:
  Provider: mock # 图片机审:空=关闭 mock=联调(URL 含 mock-review/mock-block 触发) tencent=二期云机审

Search:
  Provider: mysql # mysql=LIKE;meili=中文分词引擎(需配 Host/APIKey,compose 内为 http://meili:7700)
  SyncIntervalSec: 60
